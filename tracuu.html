<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tra cứu kết quả thi</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#ffffff;--bg2:#f7f7f5;--bg3:#f0efea;
  --border:rgba(0,0,0,0.12);--border2:rgba(0,0,0,0.22);
  --text:#1a1a18;--text2:#5f5e5a;--text3:#888780;
  --green:#3B6D11;--green-bg:#EAF3DE;--green-btn:#639922;
  --blue:#185FA5;--blue-bg:#E6F1FB;
  --amber:#854F0B;--amber-bg:#FAEEDA;
  --red:#A32D2D;--red-bg:#FCEBEB;
  --radius:8px;--radius-lg:12px;
}
@media(prefers-color-scheme:dark){
  :root{
    --bg:#1e1e1c;--bg2:#272725;--bg3:#2e2e2b;
    --border:rgba(255,255,255,0.1);--border2:rgba(255,255,255,0.2);
    --text:#e8e6de;--text2:#b4b2a9;--text3:#888780;
    --green-bg:#173404;--blue-bg:#042C53;--amber-bg:#412402;
    --red-bg:#501313;
  }
}
body{
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  font-size:14px;color:var(--text);background:var(--bg3);
  min-height:100vh;
  display:flex;flex-direction:column;align-items:center;
  padding:24px 16px;
}
.container{width:100%;max-width:560px}
.card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem 1.5rem;margin-bottom:.75rem}
.field{display:flex;flex-direction:column;gap:4px;margin-bottom:10px}
.field label{font-size:11px;font-weight:500;color:var(--text2);text-transform:uppercase;letter-spacing:.04em}
.field input,.field select{
  height:40px;border-radius:var(--radius);border:0.5px solid var(--border2);
  padding:0 12px;background:var(--bg);color:var(--text);font-size:14px;width:100%;
  transition:border-color .15s,box-shadow .15s;
}
.field input:focus,.field select:focus{
  outline:none;border-color:var(--green-btn);
  box-shadow:0 0 0 3px rgba(99,153,34,.15);
}
.btn{
  width:100%;height:42px;border-radius:var(--radius);
  border:none;background:var(--green-btn);color:#fff;
  font-size:14px;font-weight:500;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:6px;
  transition:background .12s;
}
.btn:hover{background:var(--green)}
.btn:disabled{opacity:.5;cursor:default}
.hint{font-size:12px;color:var(--text3);margin-top:4px}

/* Header */
.page-header{text-align:center;margin-bottom:1.5rem}
.page-header .icon{font-size:40px;margin-bottom:.5rem}
.page-header h1{font-size:20px;font-weight:600;margin-bottom:4px}
.page-header p{font-size:13px;color:var(--text2)}

/* Score card */
.score-card{background:var(--bg);border:0.5px solid var(--border);border-radius:var(--radius-lg);padding:1.25rem 1.5rem;margin-bottom:.6rem}
.score-header{display:flex;justify-content:space-between;align-items:flex-start;gap:12px;flex-wrap:wrap;margin-bottom:12px}
.student-name{font-size:16px;font-weight:600}
.student-id{font-size:12px;color:var(--text2);margin-top:2px}
.ky-badge{display:inline-block;padding:2px 10px;border-radius:20px;font-size:11px;font-weight:500;background:var(--blue-bg);color:var(--blue);margin-top:6px}
.score-big{text-align:right}
.score-big .num{font-size:44px;font-weight:700;line-height:1}
.score-big .denom{font-size:11px;color:var(--text2);margin-top:2px}
.xep-loai-badge{display:inline-block;padding:3px 14px;border-radius:20px;font-size:12px;font-weight:600;margin-top:6px}
.score-bar{height:6px;background:var(--bg3);border-radius:3px;overflow:hidden;margin-bottom:14px}
.score-bar-fill{height:100%;border-radius:3px;transition:width .6s ease}
.detail-grid{display:flex;gap:20px;flex-wrap:wrap;padding-top:12px;border-top:0.5px solid var(--border)}
.detail-cell .label{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.04em}
.detail-cell .val{font-size:15px;font-weight:500;margin-top:1px}

/* States */
.state-box{text-align:center;padding:2.5rem 1rem;color:var(--text2)}
.state-box .icon{font-size:36px;margin-bottom:.6rem}
.state-box p{font-size:13px}

/* Spinner */
@keyframes spin{to{transform:rotate(360deg)}}
.spinner{width:20px;height:20px;border:2px solid var(--border2);border-top-color:var(--green-btn);border-radius:50%;animation:spin .7s linear infinite}

/* Toast */
.toast{position:fixed;bottom:20px;right:20px;background:#2C2C2A;color:#fff;padding:8px 16px;border-radius:var(--radius);font-size:12px;opacity:0;transition:opacity .25s;pointer-events:none;z-index:999}
.toast.show{opacity:1}

@media(max-width:480px){
  .score-big .num{font-size:36px}
  .score-header{flex-direction:column}
  .score-big{text-align:left}
}
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="page-header">
    <div class="icon">&#127979;</div>
    <h1 id="page-title">Tra cứu kết quả thi</h1>
    <p id="page-sub">Nhập MSSV để xem điểm của bạn</p>
  </div>

  <!-- Form tra cứu -->
  <div class="card">
    <div class="field">
      <label>Mã số sinh viên (MSSV)</label>
      <input id="mssv" placeholder="VD: 2311234" maxlength="20"
        oninput="this.value=this.value.toUpperCase()"
        onkeydown="if(event.key==='Enter')lookup()" autofocus />
    </div>
    <div class="field" style="margin-bottom:14px">
      <label>Kỳ thi <span style="font-weight:400;text-transform:none;letter-spacing:0">(bỏ trống = tất cả)</span></label>
      <select id="ky"><option value="">— Tất cả kỳ thi —</option></select>
    </div>
    <button class="btn" id="btn-lookup" onclick="lookup()">
      <span id="btn-icon">&#128269;</span>
      <span id="btn-text">Tra cứu điểm</span>
    </button>
    <p class="hint" style="text-align:center;margin-top:8px">Nhập MSSV rồi nhấn Enter hoặc bấm Tra cứu</p>
  </div>

  <!-- Kết quả -->
  <div id="result-area"></div>

</div>

<div class="toast" id="toast"></div>

<script>
// ══════════════════════════════════════════════════════
//  ĐỔI DÒNG NÀY thành URL Apps Script của thầy
//  (giống HARDCODED_API_URL trong index.html)
const API_URL = "https://script.google.com/macros/s/AKfycbycqWjWO6w5nhTyYrNodqnE2xigVoytYTb7YDhmnKLWl3j7QKsPR_KszqX_grot1wilKA/exec";
// ══════════════════════════════════════════════════════

async function _get(params) {
  const url = API_URL + "?" + new URLSearchParams(params);
  const ctrl = new AbortController();
  const tid = setTimeout(() => ctrl.abort(), 20000);
  try {
    const r = await fetch(url, { redirect: "follow", signal: ctrl.signal });
    clearTimeout(tid);
    if (!r.ok) throw new Error("HTTP " + r.status);
    return await r.json();
  } catch(e) {
    clearTimeout(tid);
    throw e;
  }
}

// ── Load dropdown kỳ thi ──────────────────────────────
async function loadKyList() {
  if (!API_URL) return;
  try {
    const r = await _get({ action: "listKyThi" });
    const sel = document.getElementById("ky");
    (r.kyList || []).forEach(ky => {
      const opt = document.createElement("option");
      opt.value = ky; opt.textContent = ky;
      sel.appendChild(opt);
    });
    // Nếu có đúng 1 kỳ → tự chọn
    if (r.kyList && r.kyList.length === 1) sel.value = r.kyList[0];
  } catch(e) {}
}

// ── Tra cứu ───────────────────────────────────────────
async function lookup() {
  const mssv = (document.getElementById("mssv").value || "").trim().toUpperCase();
  const ky   = (document.getElementById("ky").value || "").trim();
  const area  = document.getElementById("result-area");
  const btn   = document.getElementById("btn-lookup");
  const btnTx = document.getElementById("btn-text");
  const btnIc = document.getElementById("btn-icon");

  if (!mssv) { toast("Vui lòng nhập MSSV!"); document.getElementById("mssv").focus(); return; }

  // Loading state
  btn.disabled = true;
  btnIc.outerHTML = '<span id="btn-icon" class="spinner"></span>';
  btnTx.textContent = "Đang tìm kiếm...";
  area.innerHTML = "";

  try {
    const params = { action: "lookupScore", mssv };
    if (ky) params.ky = ky;
    const r = await _get(params);

    if (!r.ok) {
      area.innerHTML = `
        <div class="state-box">
          <div class="icon">&#128269;</div>
          <p><strong>${escHtml(mssv)}</strong> — ${escHtml(r.error || "Không tìm thấy kết quả")}</p>
          <p style="font-size:12px;color:var(--text3);margin-top:8px">Kiểm tra lại MSSV hoặc chọn đúng kỳ thi.</p>
        </div>`;
    } else {
      area.innerHTML = r.results.map(renderCard).join("");
    }
  } catch(e) {
    area.innerHTML = `<div class="state-box"><div class="icon">⚠️</div><p>Lỗi kết nối: ${escHtml(String(e))}</p></div>`;
  } finally {
    btn.disabled = false;
    document.getElementById("btn-icon").outerHTML = '<span id="btn-icon">&#128269;</span>';
    document.getElementById("btn-text").textContent = "Tra cứu điểm";
  }
}

function renderCard(item) {
  const diem  = parseFloat(item.tong_diem) || 0;
  const pct   = Math.min(100, Math.round(diem * 10));
  const color = diem >= 8.5 ? "#639922" : diem >= 7.0 ? "#185FA5" : diem >= 5.5 ? "#BA7517" : "#E24B4A";
  const trackBg = diem >= 8.5 ? "#EAF3DE" : diem >= 7.0 ? "#E6F1FB" : diem >= 5.5 ? "#FAEEDA" : "#FCEBEB";
  const diemStr = diem % 1 === 0 ? diem.toFixed(1) : String(item.tong_diem);

  const detailCells = [
    item.diem_mcq != null && item.diem_mcq !== ""
      ? cellHtml("Phần A (MCQ)", item.diem_mcq) : "",
    item.diem_tl != null && item.diem_tl !== ""
      ? cellHtml("Phần B (Tự luận)", item.diem_tl) : "",
    item.diem_tl_thu > 0
      ? cellHtml("TL thủ công (+)", item.diem_tl_thu) : "",
    item.ma_de
      ? cellHtml("Mã đề", item.ma_de) : "",
    item.dung_tong
      ? cellHtml("Đúng / Tổng", item.dung_tong) : "",
    item.lop
      ? cellHtml("Lớp", item.lop) : "",
  ].filter(Boolean).join("");

  return `
<div class="score-card">
  <div class="score-header">
    <div>
      <div class="student-name">${escHtml(item.ho_ten || item.mssv)}</div>
      <div class="student-id">${escHtml(item.mssv)}</div>
      ${item.ky ? `<div class="ky-badge">${escHtml(item.ky)}</div>` : ""}
    </div>
    <div class="score-big">
      <div class="num" style="color:${color}">${diemStr}</div>
      <div class="denom">/ 10 điểm</div>
      <div>
        <span class="xep-loai-badge" style="background:${trackBg};color:${color}">
          ${escHtml(item.xep_loai || "")}
        </span>
      </div>
    </div>
  </div>
  <div class="score-bar">
    <div class="score-bar-fill" style="width:${pct}%;background:${color}"></div>
  </div>
  ${detailCells ? `<div class="detail-grid">${detailCells}</div>` : ""}
</div>`;
}

function cellHtml(label, val) {
  return `<div class="detail-cell"><div class="label">${escHtml(label)}</div><div class="val">${escHtml(String(val))}</div></div>`;
}

function escHtml(s) {
  return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function toast(msg){
  const el=document.getElementById("toast");
  el.textContent=msg;el.classList.add("show");
  clearTimeout(el._t);el._t=setTimeout(()=>el.classList.remove("show"),2500);
}

// ── Lấy tên môn từ getConfig (nếu có) để cập nhật tiêu đề ──────
async function loadTitle() {
  if (!API_URL) return;
  try {
    const r = await _get({ action: "getConfig" });
    if (r.ok && r.config && r.config.mon) {
      document.getElementById("page-title").textContent = "Tra cứu kết quả — " + r.config.mon;
      document.title = "Tra cứu điểm · " + r.config.mon;
    }
  } catch(e) {}
}

// ── INIT ─────────────────────────────────────────────
loadKyList();
loadTitle();

// Hỗ trợ param MSSV trên URL: tracuu.html?mssv=2311234
(function checkParam(){
  const p = new URLSearchParams(location.search);
  const m = p.get("mssv") || p.get("MSSV") || "";
  if (m) {
    document.getElementById("mssv").value = m.toUpperCase();
    setTimeout(lookup, 600); // đợi dropdown kỳ thi load xong
  }
})();
</script>
</body>
</html>
